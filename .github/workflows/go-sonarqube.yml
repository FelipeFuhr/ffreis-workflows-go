name: Go SonarQube

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      working-directory:
        description: "Directory containing the Go module"
        required: false
        type: string
        default: "."
      sonar-project-key:
        description: "SonarQube project key (defaults to repository name)"
        required: false
        type: string
        default: ""
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true

permissions:
  contents: read

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Validate SonarQube token
        env:
          SONAR_TOKEN_INPUT: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$SONAR_TOKEN_INPUT" ]]; then
            echo "::error::Missing required secret SONAR_TOKEN"
            exit 1
          fi

      - name: Generate coverage
        run: |
          set -euo pipefail
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout=120s

      - name: Build Sonar args
        id: sonar-args
        env:
          PROJECT_KEY: ${{ inputs.sonar-project-key }}
        run: |
          set -euo pipefail
          extra=""
          if [ -n "$PROJECT_KEY" ]; then
            extra="$extra -Dsonar.projectKey=$PROJECT_KEY"
          fi
          echo "args=$extra" >> "$GITHUB_OUTPUT"

      - name: Validate SonarQube host URL
        env:
          SONAR_HOST_URL_INPUT: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          if [[ -z "$SONAR_HOST_URL_INPUT" ]]; then
            echo "::error::Missing required secret SONAR_HOST_URL"
            exit 1
          fi
          if [[ "$SONAR_HOST_URL_INPUT" != http://* && "$SONAR_HOST_URL_INPUT" != https://* ]]; then
            echo "::error::SONAR_HOST_URL must include scheme (http:// or https://). Got: $SONAR_HOST_URL_INPUT"
            exit 1
          fi

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            ${{ steps.sonar-args.outputs.args }}
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
