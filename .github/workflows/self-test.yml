name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# go-sonar and go-coverage skip their scan/upload steps when the respective
# secret (SONAR_TOKEN / CODECOV_TOKEN) is not configured, so all workflows
# are always exercised in CI.

jobs:
  fmt:
    uses: ./.github/workflows/go-fmt.yml
    with:
      working-directory: examples/hello

  lint:
    uses: ./.github/workflows/go-lint.yml
    with:
      working-directory: examples/hello

  build:
    uses: ./.github/workflows/go-build.yml
    with:
      working-directory: examples/hello

  test:
    uses: ./.github/workflows/go-test.yml
    with:
      working-directory: examples/hello

  fuzz:
    uses: ./.github/workflows/go-fuzz.yml
    with:
      working-directory: examples/hello
      fuzz-targets: FuzzParseExpr
      fuzz-time: 10s

  mutation:
    uses: ./.github/workflows/go-mutation.yml
    with:
      working-directory: examples/hello
      packages: ./calculator/...
      threshold: 50

  sonar:
    uses: ./.github/workflows/go-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    uses: ./.github/workflows/go-security.yml
    with:
      working-directory: examples/hello

  coverage:
    uses: ./.github/workflows/go-coverage.yml
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    uses: ./.github/workflows/go-docs.yml
    with:
      working-directory: examples/hello

  semgrep:
    uses: ./.github/workflows/go-semgrep.yml
    with:
      working-directory: examples/hello

  container:
    uses: ./.github/workflows/go-container.yml
    with:
      image: hello-example
      push: false
      containerfile: examples/hello/Containerfile
      working-directory: examples/hello
