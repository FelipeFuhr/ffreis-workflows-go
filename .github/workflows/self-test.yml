name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  packages: write
  security-events: write

# Validates that every workflow defined in this library functions correctly
# against the minimal example app in examples/hello/.
#
# go-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# go-deepsource-coverage requires DEEPSOURCE_DSN to be configured in the repository.
# The job is skipped on fork pull requests.
#
# go-snyk requires SNYK_TOKEN plus ENABLE_SNYK=true in repository or organization
# variables. Without that variable the job is explicitly skipped. Fork pull
# requests are also skipped.

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@main

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@main
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@main
    with:
      working-directory: examples/hello

  lint:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@main
    with:
      working-directory: examples/hello

  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-build.yml@main
    with:
      working-directory: examples/hello

  test:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@main
    with:
      working-directory: examples/hello

  fuzz:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fuzz.yml@main
    with:
      working-directory: examples/hello
      fuzz-targets: FuzzParseExpr
      fuzz-time: 10s
      fuzz-parallelism: 1

  mutation:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mutation.yml@main
    with:
      working-directory: examples/hello
      packages: ./calculator
      threshold: 50

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-sonar.yml@main
    with:
      working-directory: examples/hello
      run-on-pr: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-security.yml@main
    with:
      working-directory: examples/hello

  coverage:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-coverage.yml@main
    with:
      working-directory: examples/hello
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-docs.yml@main
    with:
      working-directory: examples/hello

  semgrep:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep.yml@main
    with:
      working-directory: examples/hello

  semgrep-sarif:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep-sarif.yml@main
    with:
      working-directory: examples/hello
      upload-sarif: true

  container:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-container.yml@main
    with:
      image: hello-example
      push: false
      containerfile: examples/hello/Containerfile
      working-directory: examples/hello

  mod-tidy:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@main
    with:
      working-directory: examples/hello

  snyk:
    if: vars.ENABLE_SNYK == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-snyk.yml@main
    with:
      working-directory: examples/hello
      upload-sarif: false
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deepsource-coverage:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-deepsource-coverage.yml@main
    with:
      working-directory: examples/hello
    secrets:
      DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}

  cross-build-matrix:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-cross-build-matrix.yml@main
    with:
      go-version: "1.25.8"
      working-directory: examples/hello
      targets: |-
        ./...
