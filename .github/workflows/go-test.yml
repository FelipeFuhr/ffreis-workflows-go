name: Go Test

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing the Go module'
        required: false
        type: string
        default: '.'
      test-timeout:
        description: 'Timeout passed to go test -timeout'
        required: false
        type: string
        default: '120s'
      run-govulncheck:
        description: 'Run govulncheck after tests'
        required: false
        type: boolean
        default: true
      coverage-artifact-name:
        description: 'Name for the uploaded coverage artifact'
        required: false
        type: string
        default: 'coverage'
    outputs:
      coverage-artifact:
        description: 'Name of the uploaded coverage artifact'
        value: ${{ jobs.test.outputs.artifact-name }}

jobs:
  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Run tests
        env:
          TEST_TIMEOUT: ${{ inputs.test-timeout }}
        run: |
          go test ./... \
            -v \
            -race \
            -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout="$TEST_TIMEOUT"
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.coverage-artifact-name }}-${{ github.sha }}
          path: ${{ inputs.working-directory }}/coverage.out
          retention-days: 7
      - name: govulncheck
        if: ${{ inputs.run-govulncheck }}
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ inputs.go-version }}
          check-latest: true
          work-dir: ${{ inputs.working-directory }}
