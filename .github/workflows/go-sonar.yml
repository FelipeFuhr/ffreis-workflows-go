name: Go SonarCloud

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      working-directory:
        description: 'Directory containing the Go module'
        required: false
        type: string
        default: '.'
      sonar-project-key:
        description: 'SonarCloud project key (defaults to repository name)'
        required: false
        type: string
        default: ''
      sonar-organization:
        description: 'SonarCloud organization slug'
        required: false
        type: string
        default: ''
      coverage-artifact-name:
        description: 'Name of the coverage artifact uploaded by go-test.yml'
        required: false
        type: string
        default: ''
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: vars.SONAR_ENABLED != 'false'
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Download coverage artifact
        if: inputs.coverage-artifact-name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}

      - name: Generate coverage (if no artifact)
        if: inputs.coverage-artifact-name == ''
        run: |
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout=120s

      - name: Build Sonar extra args
        id: sonar-args
        env:
          PROJECT_KEY: ${{ inputs.sonar-project-key }}
          ORGANIZATION: ${{ inputs.sonar-organization || vars.SONAR_ORGANIZATION }}
        run: |
          set -euo pipefail
          if [[ -z "$PROJECT_KEY" && -f sonar-project.properties ]]; then
            PROJECT_KEY="$(grep -E '^sonar\\.projectKey=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi
          if [[ -z "$ORGANIZATION" && -f sonar-project.properties ]]; then
            ORGANIZATION="$(grep -E '^sonar\\.organization=' sonar-project.properties | head -n 1 | cut -d= -f2- || true)"
          fi

          EXTRA=""
          [ -n "$PROJECT_KEY" ] && EXTRA="$EXTRA -Dsonar.projectKey=$PROJECT_KEY"
          [ -n "$ORGANIZATION" ] && EXTRA="$EXTRA -Dsonar.organization=$ORGANIZATION"
          echo "args=$EXTRA" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            ${{ steps.sonar-args.outputs.args }}
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
