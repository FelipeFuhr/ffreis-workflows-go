remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: main
    configs:
      - lefthook/base.yml
      - lefthook/actionlint.yml

# fmt-check targets examples/ only — overrides the go.yml default
pre-commit:
  commands:
    fmt-check:
      glob: "examples/**/*.go"
      run: make fmt-check

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint
    actionlint:
      run: actionlint
